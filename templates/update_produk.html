<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubah Produk - Smart Retail</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, sans-serif;
            background: #0b1120;
            color: #e2e8f0;
        }
        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 28px 24px 40px;
        }
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }
        header h1 {
            margin: 0;
            font-size: clamp(1.9rem, 2.5vw, 2.6rem);
        }
        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            margin-right: 16px;
        }
        .card {
            background: rgba(17, 33, 63, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 24px;
            padding: 32px 36px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
        }
        form {
            display: grid;
            gap: 18px;
        }
        label {
            display: grid;
            gap: 8px;
            color: #cbd5e1;
            font-size: 0.95rem;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 16px 20px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: #0f172a;
            color: #e2e8f0;
            margin-top: 8px;
            font-size: 1rem;
            outline: none;
        }
        input::placeholder {
            color: #94a3b8;
        }
        input:focus {
            border-color: #7dd3fc;
        }
        button {
            width: fit-content;
            padding: 12px 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #10b981);
            color: #0b1120;
            font-weight: 700;
            cursor: pointer;
        }
        .message {
            margin-bottom: 16px;
            padding: 14px 18px;
            border-radius: 14px;
        }
        .message.error {
            background: #f87171;
            color: #fff;
        }
        .message.success {
            background: #22c55e;
            color: #0b1120;
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <div>
                <h1>Ubah Produk</h1>
                <p>Perbarui data produk untuk menjaga harga dan stok tetap akurat.</p>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('produk') }}">Kembali ke Produk</a>
                <a href="{{ url_for('keranjang') }}">Keranjang</a>
                <a href="{{ url_for('struk') }}">Struk</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </nav>
        </header>

        <section class="card">
            {% if error %}
            <div class="message error">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="message success">{{ success }}</div>
            {% endif %}
            <form method="post" action="{{ url_for('ubah_produk', product_id=produk.id) }}">
                <label>
                    Nama Produk
                    <input type="text" name="nama_produk" value="{{ produk.nama_produk }}" required>
                </label>
                <label>
                    Harga Modal
                    <input type="number" name="harga_modal" value="{{ produk.harga_modal }}" min="0" required>
                </label>
                <label>
                    Harga Jual
                    <input type="number" name="harga_jual" value="{{ produk.harga_jual }}" min="0" required>
                </label>
                <label>
                    Stok
                    <input type="number" name="stok" value="{{ produk.stok }}" min="0" required>
                </label>
                <button type="submit">Simpan Perubahan</button>
            </form>
        </section>
    </div>
</body>
</html>
