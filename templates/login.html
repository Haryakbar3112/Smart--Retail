<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Retail</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #071426 0%, #0f172a 100%);
            color: #e2e8f0;
            font-family: Inter, system-ui, sans-serif;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 23, 42, 0.94);
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
        }
        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 2.5vw, 2.4rem);
        }
        p.lead {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.6;
        }
        .message.error {
            margin-bottom: 20px;
            padding: 14px 18px;
            border-radius: 16px;
            background: #f87171;
            color: #fff;
        }
        label {
            display: block;
            margin-bottom: 16px;
            color: #cbd5e1;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px 18px;
            margin-top: 6px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #22c55e, #10b981);
            color: #0b1120;
            font-weight: 700;
            cursor: pointer;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Masuk ke Smart Retail</h1>
        <p class="lead">Silakan masukkan username dan password kamu untuk melanjutkan.</p>

        {% if error %}
        <div class="message error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('login') }}">
            <label>
                Username
                <input type="text" name="username" placeholder="Username" required autofocus>
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="Password" required>
            </label>
            <button type="submit">Masuk</button>
        </form>

        <div class="footer">Default admin: admin / admin123</div>
    </div>
</body>
</html>
