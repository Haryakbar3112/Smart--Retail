<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Retail</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            display: grid;
            place-items: center;
            font-family: Inter, system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        .login-card {
            width: min(420px, 100%);
            padding: 32px 36px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .login-card h1 {
            margin: 0 0 22px;
            font-size: 1.7rem;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 16px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.25);
            background: transparent;
            color: #e2e8f0;
            margin-top: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input::placeholder {
            color: #94a3b8;
        }
        input:focus {
            border-color: #7dd3fc;
        }
        button {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #22c55e, #10b981);
            color: #0b1120;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 14px;
        }
        @media (max-width: 520px) {
            .login-card {
                padding: 28px;
            }
        }

        .message {
            margin-bottom: 16px;
            padding: 14px 16px;
            border-radius: 14px;
        }
        .message.error {
            background: #f87171;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Login</h1>
        {% if error %}
        <div class="message error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('login') }}">
            <label>
                Username
                <input type="text" name="username" placeholder="Masukkan username" required>
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="Masukkan password" required>
            </label>
            <button type="submit">Masuk</button>
        </form>
    </div>
</body>
</html>
